name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-no-agtx-artifacts:
    name: No .agtx artifacts in PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Fail if .agtx/*.md files are tracked
        run: |
          files=$(git ls-files '.agtx/*.md')
          if [ -n "$files" ]; then
            while IFS= read -r f; do
              echo "::error file=$f,title=agtx artifact must not be merged::Remove $f before merging (agtx agent artifact)"
            done <<< "$files"
            exit 1
          fi
          echo "OK: No .agtx/*.md files found"

  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: [stable]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # - name: Check formatting
      #   run: cargo fmt --all -- --check

      # - name: Clippy
      #   run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose --features test-mocks
